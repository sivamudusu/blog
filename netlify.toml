# Netlify Configuration for Performance

[build]
  command = "npm run build"
  publish = "public"

# Cache Headers for Assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    # 1 year cache for versioned assets

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"
    # 1 week cache for CSS

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"
    # 1 week cache for JS

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    # 1 hour cache for HTML

[[headers]]
  for = "/feed.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    # 1 day cache for sitemap

# Enable Gzip Compression
[[headers]]
  for = "/*"
  [headers.values]
    Vary = "Accept-Encoding"

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Preload critical resources
[[headers]]
  for = "/*"
  [headers.values]
    Link = "</styles.css>; rel=preload; as=style, </theme.js>; rel=preload; as=script"
